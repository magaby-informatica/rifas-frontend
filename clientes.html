<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clientes - Admin</title>
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar-brand">🎟️ Rifas Online</div>
  <div class="navbar-user">
    <span id="nombre-admin">Admin</span>
    <button class="btn-logout" onclick="logout()">Cerrar Sesión</button>
  </div>
</nav>

<div class="layout">
  <aside class="sidebar">
    <a class="sidebar-item" href="dashboard.html"><span>📊</span> Dashboard</a>
    <a class="sidebar-item" href="rifas.html"><span>🎟️</span> Rifas</a>
    <a class="sidebar-item active" href="clientes.html"><span>👥</span> Clientes</a>
    <a class="sidebar-item" href="numeros.html"><span>🔢</span> Números</a>
    <a class="sidebar-item" href="pagos.html"><span>💰</span> Pagos</a>
  </aside>

  <main class="main-content">
    <h1 class="page-title">Gestión de Clientes</h1>
    <div id="alerta"></div>

    <div class="card">
      <div class="card-header">
        <h2 class="card-title">Nuevo Cliente</h2>
      </div>
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 16px;">
        <div class="form-group">
          <label>Cédula</label>
          <input type="text" id="cedula" placeholder="Número de cédula">
        </div>
        <div class="form-group">
          <label>Nombre y Apellidos</label>
          <input type="text" id="nombre_apellidos" placeholder="Nombre completo">
        </div>
        <div class="form-group">
          <label>Teléfono</label>
          <input type="text" id="telefono" placeholder="Número de teléfono">
        </div>
        <div class="form-group">
          <label>PIN de Acceso</label>
          <input type="text" id="pin" placeholder="PIN único del cliente">
        </div>
      </div>
      <button class="btn btn-primary" style="width:auto;" onclick="crearCliente()">Registrar Cliente</button>
    </div>

    <div class="card">
      <div class="card-header">
        <h2 class="card-title">Clientes Registrados</h2>
      </div>
      <table>
        <thead>
          <tr><th>ID</th><th>Cédula</th><th>Nombre</th><th>Teléfono</th><th>PIN</th><th>Acciones</th></tr>
        </thead>
        <tbody id="tabla-clientes"></tbody>
      </table>
    </div>
  </main>
</div>

<script>
  const API = window.location.origin;
  const admin = JSON.parse(localStorage.getItem('admin'));
  if (!admin) window.location.href = '/static/login.html';
  document.getElementById('nombre-admin').textContent = admin?.nombre || 'Admin';

  async function cargarClientes() {
    const clientes = await fetch(`${API}/clientes/`).then(r => r.json());
    const tbody = document.getElementById('tabla-clientes');
    tbody.innerHTML = clientes.map(c => `
      <tr>
        <td>#${c.id_cliente}</td>
        <td>${c.cedula}</td>
        <td>${c.nombre_apellidos}</td>
        <td>${c.telefono || '-'}</td>
        <td><span class="badge badge-disponible">${c.pin}</span></td>
        <td>
          <button class="btn btn-danger btn-sm" onclick="eliminarCliente(${c.id_cliente})">Eliminar</button>
        </td>
      </tr>
    `).join('');
  }

  async function crearCliente() {
    const datos = {
      cedula: document.getElementById('cedula').value,
      nombre_apellidos: document.getElementById('nombre_apellidos').value,
      telefono: document.getElementById('telefono').value,
      pin: document.getElementById('pin').value
    };
    if (!datos.cedula || !datos.nombre_apellidos || !datos.pin) {
      mostrarAlerta('Complete todos los campos obligatorios', 'error'); return;
    }
    const res = await fetch(`${API}/clientes/`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(datos)
    });
    if (res.ok) {
      mostrarAlerta('Cliente registrado exitosamente', 'success');
      cargarClientes();
      document.getElementById('cedula').value = '';
      document.getElementById('nombre_apellidos').value = '';
      document.getElementById('telefono').value = '';
      document.getElementById('pin').value = '';
    } else {
      const err = await res.json();
      mostrarAlerta(err.detail || 'Error al registrar cliente', 'error');
    }
  }

  async function eliminarCliente(id) {
    if (!confirm('¿Eliminar este cliente?')) return;
    await fetch(`${API}/clientes/${id}`, { method: 'DELETE' });
    cargarClientes();
  }

  function mostrarAlerta(msg, tipo) {
    document.getElementById('alerta').innerHTML = `<div class="alert alert-${tipo}">${msg}</div>`;
    setTimeout(() => document.getElementById('alerta').innerHTML = '', 3000);
  }

  function logout() { localStorage.clear(); window.location.href = '/static/login.html'; }
  cargarClientes();
</script>
</body>
</html>
