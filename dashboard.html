<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Rifas Online</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<nav class="navbar">
  <div style="display:flex;align-items:center;">
    <button class="btn-hamburger" onclick="toggleMenu()">&#9776;</button>
    <button class="btn-hamburger" onclick="toggleSidebar()"><div class="navbar-brand">Rifas Online</div>#9776;</button><div class="navbar-brand">Rifas Online</div>
  </div>
  <div class="navbar-user">
    <span id="nombre-admin">Admin</span>
    <button class="btn-logout" onclick="logout()">Cerrar Sesion</button>
  </div>
</nav>
<div class="sidebar-overlay" id="overlay" onclick="toggleMenu()"></div>
<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
<div class="layout">
  <aside class="sidebar" id="sidebar">
    <a class="sidebar-item active" href="dashboard.html" onclick="toggleMenu()">Dashboard</a>
    <a class="sidebar-item" href="rifas.html" onclick="toggleMenu()">Rifas</a>
    <a class="sidebar-item" href="clientes.html" onclick="toggleMenu()">Clientes</a>
    <a class="sidebar-item" href="numeros.html" onclick="toggleMenu()">Numeros</a>
    <a class="sidebar-item" href="pagos.html" onclick="toggleMenu()">Pagos</a>
  </aside>
  <main class="main-content">
    <h1 class="page-title">Dashboard</h1>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-number" id="total-rifas">0</div><div class="stat-label">Rifas Activas</div></div>
      <div class="stat-card"><div class="stat-number" id="total-clientes">0</div><div class="stat-label">Clientes</div></div>
      <div class="stat-card"><div class="stat-number" id="total-pagados">0</div><div class="stat-label">Numeros Pagados</div></div>
      <div class="stat-card"><div class="stat-number" id="total-deben">0</div><div class="stat-label">Numeros que Deben</div></div>
    </div>
    <div class="card">
      <div class="card-header">
        <h2 class="card-title">Rifas Recientes</h2>
        <a href="rifas.html"><button class="btn btn-primary btn-sm">Ver Todas</button></a>
      </div>
      <table>
        <thead><tr><th>ID</th><th>Loteria</th><th>Premio</th><th>Fecha</th><th>Precio</th><th>Acciones</th></tr></thead>
        <tbody id="tabla-rifas"><tr><td colspan="6">Cargando...</td></tr></tbody>
      </table>
    </div>
  </main>
</div>
<script>
  const API = "https://rifas-online-zeta.vercel.app";
  const admin = JSON.parse(localStorage.getItem('admin') || 'null');
  if (!admin) window.location.href = 'login.html';
  else document.getElementById('nombre-admin').textContent = admin.nombre || 'Admin';

  function logout() { localStorage.removeItem('admin'); window.location.href = 'login.html'; }
  function toggleMenu() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('overlay').classList.toggle('active');
  }

  async function cargarDatos() {
    try {
      const res = await fetch(`${API}/rifas/`);
      const rifas = await res.json();
      document.getElementById('total-rifas').textContent = rifas.length;
      const tbody = document.getElementById('tabla-rifas');
      if (rifas.length === 0) { tbody.innerHTML = '<tr><td colspan="6">No hay rifas creadas</td></tr>'; return; }
      tbody.innerHTML = rifas.map(r => `
        <tr>
          <td>${r.id_rifa}</td><td>${r.loteria}</td><td>${r.premio}</td>
          <td>${r.fecha}</td><td>$${Number(r.precio_boleta).toLocaleString()}</td>
          <td><a href="numeros.html?rifa=${r.id_rifa}"><button class="btn btn-primary btn-sm">Ver Numeros</button></a></td>
        </tr>`).join('');
    } catch(e) { document.getElementById('tabla-rifas').innerHTML = '<tr><td colspan="6">Error cargando datos</td></tr>'; }
  }
  async function cargarClientes() {
    try {
      const res = await fetch(`${API}/clientes/`);
      const data = await res.json();
      document.getElementById('total-clientes').textContent = data.length;
    } catch(e) {}
  }
  cargarDatos(); cargarClientes();
</script>
<script>
function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("open");
  document.getElementById("sidebar-overlay").classList.toggle("active");
}
function closeSidebar() {
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("sidebar-overlay").classList.remove("active");
}
</script>
</body>
</html>
