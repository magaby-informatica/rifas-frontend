<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rifas Online - Admin</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">🎟️</div>
      <h1>Rifas Online</h1>
      <p>Panel de Administracion</p>
      <div id="alerta"></div>
      <div class="form-group">
        <label>Usuario</label>
        <input type="text" id="usuario" placeholder="Ingrese su usuario">
      </div>
      <div class="form-group">
        <label>Contrasena</label>
        <input type="password" id="contrasena" placeholder="Ingrese su contrasena">
      </div>
      <button class="btn btn-primary" onclick="login()">Ingresar</button>
    </div>
  </div>
  <script>
    const API = "https://rifas-online-zeta.vercel.app";
    async function login() {
      const usuario = document.getElementById('usuario').value;
      const contrasena = document.getElementById('contrasena').value;
      if (!usuario || !contrasena) { mostrarAlerta('Complete todos los campos', 'error'); return; }
      try {
        const res = await fetch(`${API}/auth/admin/login`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ usuario, contrasena })
        });
        const data = await res.json();
        if (res.ok) {
          localStorage.setItem('admin', JSON.stringify(data));
          window.location.href = 'dashboard.html';
        } else {
          mostrarAlerta(data.detail || 'Error al iniciar sesion', 'error');
        }
      } catch (e) {
        mostrarAlerta('Error de conexion con el servidor', 'error');
      }
    }
    function mostrarAlerta(msg, tipo) {
      document.getElementById('alerta').innerHTML = `<div class="alert alert-${tipo}">${msg}</div>`;
    }
    document.addEventListener('keypress', e => { if (e.key === 'Enter') login(); });
  </script>
</body>
</html>
